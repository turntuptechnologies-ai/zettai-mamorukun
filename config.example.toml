# zettai-mamorukun 設定ファイル
# /etc/zettai-mamorukun/config.toml にコピーして使用する

[general]
# ログレベル: trace, debug, info, warn, error
log_level = "info"
# systemd-journald への構造化ログ送信の有効/無効
# 有効にすると journald にネイティブ構造化ログを送信し、
# journalctl でのフィルタリング（PRIORITY 等）が容易になる
# journald ソケットが利用できない環境では自動的に無効化される
journald_enabled = true
# journald カスタムフィールドのプレフィックス
# SecurityEvent の各フィールドが {PREFIX}_EVENT_TYPE, {PREFIX}_SEVERITY 等の
# 名前で journald に送信される
# 使用例: journalctl ZETTAI_SEVERITY=CRITICAL
#         journalctl ZETTAI_MODULE=file_integrity
#         journalctl ZETTAI_EVENT_TYPE=file_modified
# 大文字英数字とアンダースコアのみ使用可能
journald_field_prefix = "ZETTAI"

[daemon]
# シャットダウンタイムアウト（秒）
# SIGTERM/SIGINT 受信後、実行中のアクション（Webhook 送信、コマンド実行等）の
# 完了をこの時間まで待機する。タイムアウト後は強制終了する
shutdown_timeout_secs = 30

[startup_scan]
# 起動時セキュリティスキャンの有効/無効
# 有効にするとデーモン起動時に全有効モジュールの初期スキャンを実行し、
# 現在のシステム状態をベースラインとして記録する
enabled = true
# スキャン全体のタイムアウト（秒）
timeout_secs = 60
# スキャン結果の永続化の有効/無効
# 有効にするとスキャン結果をファイルに保存し、次回起動時に前回との差分を検出する
persist_state = true
# スキャン状態ファイルのパス
state_file = "/var/lib/zettai-mamorukun/scan_state.json"

[modules.file_integrity]
# ファイル整合性監視モジュールの有効/無効
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 300
# 監視対象パスのリスト
watch_paths = []

[modules.process_monitor]
# プロセス異常検知モジュールの有効/無効
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 60
# 不審とみなすパスのリスト
suspicious_paths = ["/tmp", "/dev/shm", "/var/tmp"]

[modules.kernel_module]
# カーネルモジュール監視モジュールの有効/無効
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 120

[modules.auditd_monitor]
# Linux Audit サブシステム（auditd）のログを解析し、セキュリティイベントを検知する
# auditd が有効な環境でのみ機能する
enabled = false
# チェック間隔（秒）
check_interval_secs = 30
# auditd ログファイルのパス
log_path = "/var/log/audit/audit.log"
# 監視対象のイベントタイプ
watch_types = ["EXECVE", "SYSCALL", "USER_AUTH", "USER_LOGIN", "AVC", "ANOMALY"]

[modules.login_session_monitor]
# ログインセッション監視モジュール — utmp/wtmp を監視して不審なセッションを検知
enabled = false
# チェック間隔（秒）
check_interval_secs = 30
# utmp ファイルパス
utmp_path = "/var/run/utmp"
# wtmp ファイルパス
wtmp_path = "/var/log/wtmp"
# root 直接ログインの検知を有効化
alert_root_login = true
# 同一ユーザーの最大同時セッション数
max_concurrent_sessions = 3
# 不審な時間帯（24時間制）
suspicious_hours_start = 0
suspicious_hours_end = 6
# 不審な時間帯のログイン検知を有効化
alert_suspicious_hours = false

[modules.proc_maps_monitor]
# プロセスメモリマップ監視モジュール — /proc/[pid]/maps を解析し不審なライブラリインジェクションを検知
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 60
# 不審なパスのリスト（これらのパスからのライブラリロードを検知）
suspicious_paths = ["/tmp", "/dev/shm", "/var/tmp"]
# 削除済みファイルからのマッピングを検知するか
detect_deleted_mappings = true
# RWX 権限を持つ匿名メモリ領域を検知するか
detect_rwx_anonymous = true
# 隠しファイルからのライブラリロードを検知するか
detect_hidden_libraries = true
# 除外するプロセス名のリスト
exclude_processes = []
# 除外するライブラリパスのリスト
exclude_paths = []

[modules.ptrace_monitor]
# ptrace 検知モジュール — /proc/[pid]/status の TracerPid を監視し不正なデバッガ注入を検知
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 30
# 許可するトレーサーのプロセス名リスト（開発環境で正規のデバッガを除外する用途）
whitelist_tracers = []

[modules.at_job_monitor]
# at/batch ジョブ監視モジュールの有効/無効
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 120
# 監視対象パスのリスト
watch_paths = ["/var/spool/at", "/var/spool/cron/atjobs", "/etc/at.allow", "/etc/at.deny"]

[modules.cron_monitor]
# Cron ジョブ改ざん検知モジュールの有効/無効
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 120
# 監視対象パスのリスト
watch_paths = ["/etc/crontab", "/etc/cron.d", "/etc/cron.hourly", "/etc/cron.daily", "/etc/cron.weekly", "/etc/cron.monthly", "/var/spool/cron/crontabs"]

[modules.log_tamper]
# ログファイル改ざん検知モジュールの有効/無効
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 30
# 監視対象パスのリスト
watch_paths = ["/var/log/syslog", "/var/log/auth.log", "/var/log/kern.log", "/var/log/messages"]
# logrotate によるファイル変更を誤検知しないようにする（デフォルト: true）
logrotate_aware = true
# logrotate 検知後のイベント抑制時間（秒）（デフォルト: 300）
logrotate_suppression_secs = 300

[modules.systemd_service]
# systemd サービス監視モジュールの有効/無効
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 120
# 監視対象パスのリスト
watch_paths = ["/etc/systemd/system", "/usr/lib/systemd/system", "/usr/local/lib/systemd/system"]

[modules.systemd_timer_monitor]
# systemd タイマー監視モジュールの有効/無効
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 30
# 監視対象ディレクトリのリスト
timer_dirs = ["/etc/systemd/system", "/usr/lib/systemd/system", "/run/systemd/system"]
# 不審と判定するインターバルの閾値（秒）
min_interval_warn_seconds = 60

[modules.firewall_monitor]
# ファイアウォールルール監視モジュールの有効/無効
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 60
# 監視対象パスのリスト
watch_paths = ["/proc/net/ip_tables_names", "/proc/net/ip6_tables_names", "/proc/net/ip_tables_targets", "/proc/net/ip_tables_matches", "/proc/net/ip6_tables_targets", "/proc/net/ip6_tables_matches"]

[modules.dns_monitor]
# DNS設定改ざん検知モジュールの有効/無効
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 30
# 監視対象パスのリスト
watch_paths = ["/etc/resolv.conf", "/etc/hosts"]

[modules.ssh_key_monitor]
# SSH公開鍵ファイル監視モジュールの有効/無効
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 120
# 監視対象の authorized_keys ファイルパスのリスト
watch_paths = ["/root/.ssh/authorized_keys"]

[modules.shell_config_monitor]
# シェル設定ファイル監視モジュールの有効/無効
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 120
# 監視対象のシェル設定ファイルパスのリスト
watch_paths = ["/etc/profile", "/etc/bash.bashrc", "/etc/environment", "/root/.bashrc", "/root/.profile"]

[modules.mount_monitor]
# マウントポイント監視モジュールの有効/無効
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 30
# マウント情報ファイルのパス
mounts_path = "/proc/mounts"

[modules.tmp_exec_monitor]
# 一時ディレクトリ実行ファイル検知モジュールの有効/無効
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 60
# 監視対象ディレクトリのリスト
watch_dirs = ["/tmp", "/dev/shm", "/var/tmp"]

[modules.sudoers_monitor]
# sudoers ファイル監視モジュールの有効/無効
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 120
# 監視対象パスのリスト（ファイルまたはディレクトリ）
watch_paths = ["/etc/sudoers", "/etc/sudoers.d"]

[modules.pam_monitor]
# PAM 設定監視モジュールの有効/無効
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 120
# 監視対象パスのリスト（ファイルまたはディレクトリ）
watch_paths = ["/etc/pam.d"]

[modules.security_files_monitor]
# /etc/security/ 監視モジュールの有効/無効
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 120
# 監視対象パスのリスト（ファイルまたはディレクトリ）
watch_paths = [
    "/etc/security/limits.conf",
    "/etc/security/limits.d",
    "/etc/security/access.conf",
    "/etc/security/namespace.conf",
    "/etc/security/group.conf",
    "/etc/security/time.conf",
    "/etc/security/pam_env.conf",
    "/etc/security/faillock.conf",
    "/etc/security/pwquality.conf",
]

[modules.mac_monitor]
# SELinux / AppArmor 監視モジュールの有効/無効
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 30
# SELinux 設定ファイルのパスリスト
selinux_config_paths = ["/etc/selinux/config"]
# SELinux ポリシーディレクトリのリスト
selinux_policy_dirs = ["/etc/selinux"]
# SELinux enforce ファイルのパス
selinux_enforce_path = "/sys/fs/selinux/enforce"
# AppArmor 設定パスのリスト
apparmor_config_paths = ["/etc/apparmor", "/etc/apparmor.d"]
# AppArmor profiles ファイルのパス
apparmor_profiles_path = "/sys/kernel/security/apparmor/profiles"

[modules.capabilities_monitor]
# Linux capabilities 監視モジュールの有効/無効
# /proc/*/status の CapEff/CapPrm を定期スキャンし、
# 危険な capabilities を持つプロセスを検知する
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 60
# 危険と見なす capabilities のビット番号リスト
# デフォルト: DAC_OVERRIDE(1), SETGID(6), SETUID(7), NET_ADMIN(12),
#             NET_RAW(13), SYS_MODULE(16), SYS_PTRACE(19), SYS_ADMIN(21)
dangerous_caps = [1, 6, 7, 12, 13, 16, 19, 21]
# ホワイトリスト（除外するプロセス名）
whitelist_processes = [
  "systemd",
  "systemd-journal",
  "systemd-udevd",
  "systemd-logind",
  "systemd-resolve",
  "systemd-timesyn",
  "systemd-network",
  "networkd-dispat",
  "dbus-daemon",
  "polkitd",
]

[modules.container_namespace]
# コンテナ・名前空間検知モジュールの有効/無効
# /proc/self/ns/ の inode と /proc/self/cgroup を定期スキャンし、
# コンテナブレイクアウトや名前空間の不正操作を検知する
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 30
# 監視対象の名前空間リスト
watch_namespaces = ["mnt", "pid", "net", "ipc", "uts", "user", "cgroup"]
# コンテナ環境マーカー（/.dockerenv, /run/.containerenv）のチェック
check_container_env = true

[modules.cgroup_monitor]
# cgroup v2 リソース制限監視モジュールの有効/無効
# /sys/fs/cgroup/ 配下を定期スキャンし、
# リソース制限の不正な変更を検知する
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 30
# cgroup v2 ファイルシステムのベースパス
cgroup_path = "/sys/fs/cgroup"
# 再帰スキャンの最大深さ
max_depth = 5
# 監視対象の cgroup ファイル名リスト
watch_files = ["memory.max", "memory.high", "cpu.max", "pids.max", "io.max"]

[modules.kernel_params]
# /proc/sys/ カーネルパラメータ監視モジュールの有効/無効
# セキュリティ関連カーネルパラメータを定期スキャンし、
# 変更や弱体化を検知する
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 60
# proc/sys のベースパス
proc_sys_path = "/proc/sys"
# 監視対象パラメータルール
# path: パラメータパス（proc_sys_path からの相対パス）
# min_value: 最小値（この値未満で Critical）
# expected_value: 期待値（不一致で Warning）
[[modules.kernel_params.watch_params]]
path = "kernel/kptr_restrict"
min_value = 1
[[modules.kernel_params.watch_params]]
path = "kernel/dmesg_restrict"
min_value = 1
[[modules.kernel_params.watch_params]]
path = "kernel/randomize_va_space"
min_value = 2
[[modules.kernel_params.watch_params]]
path = "kernel/sysrq"
[[modules.kernel_params.watch_params]]
path = "kernel/unprivileged_bpf_disabled"
min_value = 1
[[modules.kernel_params.watch_params]]
path = "kernel/yama/ptrace_scope"
min_value = 1
[[modules.kernel_params.watch_params]]
path = "kernel/perf_event_paranoid"
min_value = 2
[[modules.kernel_params.watch_params]]
path = "kernel/core_pattern"

[modules.proc_net_monitor]
# /proc/net/ 監視モジュールの有効/無効
# ルーティングテーブル（/proc/net/route）と ARP テーブル（/proc/net/arp）を
# 定期スキャンし、不正変更・ARP スプーフィングを検知する
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 30
# /proc/net/route のパス
route_path = "/proc/net/route"
# /proc/net/arp のパス
arp_path = "/proc/net/arp"

[modules.seccomp_monitor]
# seccomp プロファイル監視モジュールの有効/無効
# /proc/*/status の Seccomp フィールドを定期スキャンし、
# 監視対象プロセスの seccomp フィルタが無効化されていないかを検知する
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 30
# 監視対象プロセス名のリスト
watched_processes = [
  "sshd",
  "nginx",
  "apache2",
  "postgres",
  "mysqld",
  "dockerd",
  "containerd",
  "named",
  "unbound",
  "haproxy",
]

[modules.usb_monitor]
# USB デバイス監視モジュールの有効/無効
# /sys/bus/usb/devices/ を定期スキャンし、
# USB デバイスの接続・切断を検知する（BadUSB 攻撃対策）
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 10
# USB デバイスディレクトリのパス
devices_path = "/sys/bus/usb/devices"

[modules.listening_port_monitor]
# リスニングポート監視モジュールの有効/無効
# /proc/net/tcp{,6}, /proc/net/udp{,6} を定期スキャンし、
# 想定外のリスニングポートやバインドアドレスの変更を検知する
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 30
# 許可ポートリスト（"プロトコル:ポート番号" 形式）
# 空の場合はホワイトリストを適用しない（変更検知のみ）
allowed_ports = ["tcp:22", "tcp:80", "tcp:443", "udp:53"]
# IPv6 監視の有効/無効
enable_ipv6 = true
# /proc/net/tcp のパス
tcp_path = "/proc/net/tcp"
# /proc/net/tcp6 のパス
tcp6_path = "/proc/net/tcp6"
# /proc/net/udp のパス
udp_path = "/proc/net/udp"
# /proc/net/udp6 のパス
udp6_path = "/proc/net/udp6"

[modules.fd_monitor]
# ファイルディスクリプタ監視モジュールの有効/無効
# /proc/[pid]/fd を定期スキャンし、削除済みファイルへの fd 参照、
# fd 数の閾値超過、不審なソケット参照を検知する
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 60
# プロセスあたりの最大 fd 数（これを超えると Warning）
max_fd_per_process = 1024
# /proc ディレクトリのパス
proc_path = "/proc"
# ホワイトリストプロセス名（これらのプロセスは検知対象外）
whitelist_processes = []

[modules.network_interface_monitor]
# ネットワークインターフェース監視モジュールの有効/無効
# /sys/class/net/ を定期スキャンし、インターフェースの追加・削除・
# プロミスキャスモード・フラグ変更を検知する
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 30
# 無視するインターフェース名のリスト
ignore_interfaces = ["lo"]
# /sys/class/net/ ディレクトリのパス
sys_class_net_path = "/sys/class/net"

[modules.network_traffic_monitor]
# ネットワークトラフィック異常検知モジュールの有効/無効
# /proc/net/dev の統計値を定期スキャンし、トラフィック量の急激な増減を検知する
# DDoS やデータ流出の早期警告に有効
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 30
# 無視するインターフェース名のリスト
ignore_interfaces = ["lo"]
# /proc/net/dev ファイルのパス
proc_net_dev_path = "/proc/net/dev"
# バイト数/秒の閾値（受信+送信の合計、0 で無効化）
threshold_bytes_per_sec = 104857600   # 100 MB/s
# パケット数/秒の閾値（受信+送信の合計、0 で無効化）
threshold_packets_per_sec = 100000    # 100k packets/s
# エラー数/秒の閾値（受信+送信の合計、0 で無効化）
threshold_errors_per_sec = 10
# ドロップ数/秒の閾値（受信+送信の合計、0 で無効化）
threshold_drops_per_sec = 10

[modules.env_injection_monitor]
# 環境変数インジェクション検知モジュールの有効/無効
# /proc/*/environ を定期スキャンし、プロセス単位の不審な環境変数設定を検知する
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 60
# 除外プロセス名リスト（ランタイムパス変数の検知対象外）
exclude_processes = ["java", "gradle", "mvn", "node", "npm", "python3", "ruby", "perl"]
# 不審パスとみなすディレクトリのリスト
suspicious_paths = ["/tmp", "/dev/shm", "/var/tmp", "."]
# 追加の危険環境変数名（組み込みリストに加えて検知する変数名）
extra_dangerous_vars = []
# proxy 変数（HTTP_PROXY/HTTPS_PROXY）の検知を有効にするか
check_proxy_vars = true

[modules.shm_monitor]
# 共有メモリ（/dev/shm）監視モジュールの有効/無効
# /dev/shm 内の不審なファイル（実行可能ファイル、ELFバイナリ、大容量ファイル、隠しファイル）を検知する
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 30
# 監視対象ディレクトリのパス
watch_dir = "/dev/shm"
# 大容量ファイルと判定する閾値（MB）
large_file_threshold_mb = 10

[modules.process_tree_monitor]
# プロセスツリー監視モジュールの有効/無効
# プロセスの親子関係を分析し、不審なパターン（Webサーバからのシェル起動等）を検知する
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 60
# プロセスツリーの最大深度
max_depth = 10
# 除外パス
whitelist_paths = []

# 不審な親子関係パターン（デフォルトパターンは組み込み済み）
# [[modules.process_tree_monitor.suspicious_patterns]]
# parent = "nginx|httpd|apache2"
# child = "sh|bash|dash|zsh|fish"
# description = "Web サーバからのシェル起動"

[modules.inotify_monitor]
# inotify ベースのリアルタイムファイル変更検知モジュールの有効/無効
# inotify を使ってファイルシステムの変更をリアルタイムに検知する
# 既存の file_integrity モジュール（ポーリング型）と異なり、低レイテンシで検知可能
enabled = false
# 監視対象パスのリスト
watch_paths = ["/etc", "/usr/bin", "/usr/sbin"]
# 再帰的監視の有効/無効（サブディレクトリも監視するか）
recursive = true
# 除外パターン（glob）のリスト
# マッチするファイル名・ディレクトリ名は監視対象から除外される
exclude_patterns = ["*.swp", "*.tmp", "*~", ".git"]
# inotify watch の最大数
# /proc/sys/fs/inotify/max_user_watches を超えないよう設定
max_watches = 65536
# デバウンス時間（ミリ秒）
# 同一ファイルの連続イベントをこの時間内で集約する
debounce_ms = 100

[modules.process_exec_monitor]
# プロセス起動監視モジュールの有効/無効
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 3
# 不審とみなす実行パス
suspicious_paths = ["/tmp", "/dev/shm", "/var/tmp"]
# 不審なコマンドパターン（正規表現）
suspicious_commands = [
    "nc\\s+.*-e",
    "ncat\\s+.*-e",
    "bash\\s+-i\\s+>&\\s+/dev/tcp",
    "python[23]?\\s+-c\\s+.*socket",
    "perl\\s+-e\\s+.*socket",
    "ruby\\s+-e\\s+.*socket",
]
# 許可リスト（このパスのプロセスは無視）
allowed_processes = []

[modules.xattr_monitor]
# ファイルシステム xattr（拡張属性）監視モジュールの有効/無効
# SELinux ラベル、capabilities 属性、ACL 等の拡張属性の変更を検知する
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 300
# 監視対象パスのリスト
watch_paths = ["/etc", "/usr/bin", "/usr/sbin", "/usr/local/bin"]
# 監視対象の xattr 名前空間のリスト
# security.*: SELinux コンテキスト、capabilities（変更時 High）
# system.*: POSIX ACL（変更時 Medium）
# user.*: ユーザー定義属性（変更時 Low）
namespaces = ["security", "system", "user"]

[modules.suid_sgid_monitor]
# SUID/SGID ファイル監視モジュールの有効/無効
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 300
# 監視対象ディレクトリのリスト
watch_dirs = ["/usr/bin", "/usr/sbin", "/usr/local/bin", "/usr/local/sbin"]

[modules.user_account]
# ユーザーアカウント監視モジュールの有効/無効
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 60
# passwd ファイルのパス
passwd_path = "/etc/passwd"
# group ファイルのパス
group_path = "/etc/group"

[modules.pkg_repo_monitor]
# パッケージリポジトリ改ざん検知モジュールの有効/無効
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 120
# 監視対象パスのリスト（ファイルまたはディレクトリ）
watch_paths = ["/etc/apt/sources.list", "/etc/apt/sources.list.d", "/etc/yum.repos.d"]

[modules.ld_preload_monitor]
# 環境変数・LD_PRELOAD 監視モジュールの有効/無効
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 60
# 監視対象パスのリスト（ファイルまたはディレクトリ）
watch_paths = ["/etc/ld.so.preload", "/etc/environment", "/etc/ld.so.conf", "/etc/ld.so.conf.d"]

[modules.network_monitor]
# ネットワーク接続監視モジュールの有効/無効
enabled = false
# 監視間隔（秒）
interval_secs = 30
# IPv6 監視の有効/無効
enable_ipv6 = true
# 不審ポートリスト
suspicious_ports = [4444, 5555, 6666, 8888, 1337]
# 接続数閾値
max_connections = 1000

[modules.tls_cert_monitor]
# TLS 証明書有効期限監視モジュールの有効/無効
enabled = false
# チェック間隔（秒）
check_interval_secs = 3600
# 監視対象ディレクトリのリスト
watch_dirs = ["/etc/ssl/certs", "/etc/pki/tls/certs"]
# 警告を発行する残日数の閾値
warning_days = 30
# 重大アラートを発行する残日数の閾値
critical_days = 7
# 対象ファイル拡張子
file_extensions = [".pem", ".crt", ".cer"]

[modules.ssh_brute_force]
# SSH ブルートフォース検知モジュールの有効/無効
enabled = false
# スキャン間隔（秒）
interval_secs = 30
# 認証ログファイルのパス
auth_log_path = "/var/log/auth.log"
# 認証失敗の閾値（この回数を超えるとアラート）
max_failures = 5
# 時間窓（秒）- この期間内の失敗回数をカウント
time_window_secs = 300

[metrics]
# イベント統計・メトリクス収集の有効/無効
enabled = false
# サマリーログ出力インターバル（秒）
interval_secs = 60

[event_bus]
# イベントバスの有効/無効
enabled = false
# ブロードキャストチャネルの容量
channel_capacity = 1024
# イベントデバウンス間隔（秒）— 同一イベントをこの期間内は抑制する
# 0 でデバウンスを無効化。Critical イベントは常に即時配信
debounce_secs = 30

# モジュールごとのイベントフィルタリング設定
# [event_bus.filters.file_integrity]
# exclude_patterns = ["\\.swp$", "\\.tmp$", "~$"]
# include_patterns = []
# min_severity = "warning"

[actions]
# アクションエンジンの有効/無効
# ※ SIGHUP によるホットリロードに対応（ルール変更はデーモン再起動不要）
enabled = false

# [[actions.rules]]
# name = "critical_command"
# severity = "Critical"
# action = "command"
# command = "/usr/local/bin/alert.sh '{{message}}'"
# timeout_secs = 30

# [[actions.rules]]
# name = "warning_log"
# severity = "Warning"
# action = "log"

# [[actions.rules]]
# name = "webhook_alert"
# severity = "critical"
# action = "webhook"
# url = "https://hooks.slack.com/services/xxx/yyy/zzz"
# method = "POST"
# timeout_secs = 10
# max_retries = 3
# [actions.rules.headers]
# Content-Type = "application/json"
# body_template = '{"text": "[{{severity}}] {{source}}: {{message}}"}'

# レートリミット設定（トークンバケットアルゴリズム）
# 未設定の場合はレートリミットなし
# [actions.rate_limit.command]
# max_tokens = 10           # バケット容量（バースト許容数）
# refill_amount = 5         # 補充トークン数
# refill_interval_secs = 60 # 補充間隔（秒）

# [actions.rate_limit.webhook]
# max_tokens = 20           # バケット容量（バースト許容数）
# refill_amount = 10        # 補充トークン数
# refill_interval_secs = 60 # 補充間隔（秒）

# ダイジェスト通知設定
# 一定期間内のイベントを集約し、まとめてダイジェスト通知として送信する
# Webhook のノイズ削減に有効
# [actions.digest]
# enabled = false
# # ダイジェスト集約間隔（秒）
# interval_secs = 300
# # ダイジェスト通知の最小イベント数（この数未満の場合はスキップ）
# min_events = 2
# # ダイジェスト通知用 Webhook URL（未設定の場合はログのみ）
# webhook_url = "https://hooks.slack.com/services/xxx/yyy/zzz"
# # HTTP メソッド
# method = "POST"
# # リトライ回数
# max_retries = 3
# # HTTP ヘッダー
# [actions.digest.headers]
# Content-Type = "application/json"
# # ボディテンプレート（プレースホルダ: {{count}}, {{summary}}, {{period_secs}}）
# body_template = '{"text": "ダイジェスト通知: {{period_secs}}秒間に{{count}}件のイベントが発生しました\n{{summary}}"}'

[event_store]
# イベントストア（SQLite 永続化）の有効/無効
# 有効にすると SecurityEvent を SQLite データベースに永続保存する
# 過去のイベント検索・分析・フォレンジック対応に利用可能
enabled = false
# SQLite データベースファイルパス
database_path = "/var/lib/zettai-mamorukun/events.db"
# イベント保持期間（日数）— この期間を超えた古いイベントは自動削除される
retention_days = 90
# バッチ挿入サイズ — この件数に達するとバッファをフラッシュする
batch_size = 100
# バッチフラッシュ間隔（秒）— バッチサイズに達しなくてもこの間隔でフラッシュ
batch_interval_secs = 5
# クリーンアップ実行間隔（時間）— 古いイベントの削除を実行する間隔
cleanup_interval_hours = 24
# CRITICAL イベントの保持期間（日数）
# retention_days より長い期間を設定することで、重要イベントをより長く保持する
# 0 の場合は retention_days と同じ（Severity 別保持なし）
retention_days_critical = 365
# ストレージ上限（MB）
# DB ファイルサイズがこの値を超えた場合、古い INFO → WARNING → CRITICAL の順で削除する
# 0 の場合は上限なし（無制限）
max_storage_mb = 0

[event_stream]
# イベントストリーム（Unix ソケット経由リアルタイムイベント配信）の有効/無効
# 有効にすると外部プロセスが Unix ソケットに接続して NDJSON 形式のイベントストリームを受信できる
# `zettai-mamorukun stream-events` コマンドで接続可能
enabled = false
# Unix ソケットのパス
socket_path = "/var/run/zettai-mamorukun/event_stream.sock"
# クライアントごとの送信バッファサイズ
# バッファが溢れた場合はイベントを破棄する（遅いクライアントのバックプレッシャー対策）
buffer_size = 256

[status]
# ステータスサーバー（Unix ソケット）の有効/無効
# 有効にすると `zettai-mamorukun status` コマンドでデーモンの状態を確認できる
enabled = false
# Unix ソケットのパス
socket_path = "/var/run/zettai-mamorukun/status.sock"

[correlation]
# 相関分析エンジンの有効/無効
# 複数のセキュリティイベントを時系列で相関分析し、多段階攻撃パターンを検知する
enabled = false
# イベントウィンドウの保持期間（秒）
window_secs = 600
# ウィンドウ内の最大イベント保持数
max_events = 10000
# クリーンアップ間隔（秒）
cleanup_interval_secs = 30
# プリセットルール（権限昇格・ラテラルムーブメント・ランサムウェア等 8 種）の有効/無効
# true にすると組み込みプリセットが自動的に追加される
enable_presets = true
# 無効にするプリセットのリスト（プリセット名を指定、"preset:" プレフィックスは省略可）
# 例: ["container_escape", "network_reconnaissance"]
disabled_presets = []

# 多段階攻撃パターン: SSH ブルートフォース → ユーザー追加 → cron 変更
[[correlation.rules]]
name = "ssh_to_persistence"
description = "SSH ブルートフォース成功後の永続化試行を検知"
within_secs = 3600

[[correlation.rules.steps]]
name = "ssh_brute_force"
event_type = "ssh_brute_force"
min_severity = "warning"

[[correlation.rules.steps]]
name = "user_added"
event_type = "user_added"

[[correlation.rules.steps]]
name = "cron_modified"
event_type = "cron_modified"

# 権限昇格パターン: sudoers 変更 → SUID ファイル作成
[[correlation.rules]]
name = "privilege_escalation"
description = "sudoers 変更後の SUID ファイル作成を検知"
within_secs = 1800

[[correlation.rules.steps]]
name = "sudoers_changed"
event_type = "sudoers_modified"

[[correlation.rules.steps]]
name = "suid_created"
event_type = "suid_sgid_new"

[health]
# ハートビート（定期的なヘルスチェックログ出力）の有効/無効
enabled = true
# ハートビートのインターバル（秒）
heartbeat_interval_secs = 60

[modules.kallsyms_monitor]
# カーネルシンボルテーブル監視モジュール — /proc/kallsyms を監視しルートキットによるシンボル改ざんを検知
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 300

[modules.coredump_monitor]
# コアダンプ設定監視モジュール — core_pattern / suid_dumpable 等を監視し、コアダンプ悪用攻撃を検知
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 30
# /proc パス（通常は変更不要）
# proc_path = "/proc"

[modules.ebpf_monitor]
# eBPF プログラム監視モジュール — /proc/[pid]/fdinfo を走査し、不正な eBPF プログラムのロードを検知
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 30
# /proc パス（通常は変更不要）
# proc_path = "/proc"
# 許可するプログラム名のリスト（これらのプロセスによる eBPF ロードは Info レベルで記録）
# allowed_programs = ["systemd", "bpftrace"]

[modules.dbus_monitor]
# D-Bus シグナル監視モジュール — D-Bus システムバス上のサービス状態変更を検知
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 30
# systemd ユニット状態変更を監視する
watch_systemd = true
# D-Bus バス名の出現・消失を監視する
watch_bus_names = true

[modules.swap_tmpfs_monitor]
# スワップ / tmpfs 監視モジュール — スワップデバイスの追加・削除、swappiness 変更、
# tmpfs マウントの追加・削除、tmpfs 上の実行ファイル、tmpfs 使用量超過を検知
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 30
# tmpfs 使用量の閾値（%）— この値を超えるとアラート
tmpfs_usage_threshold_percent = 80
# tmpfs 上の実行ファイルをスキャンするか
scan_executables = true
# 除外する tmpfs マウントポイント（/dev/shm は shm_monitor が担当）
exclude_paths = ["/dev/shm"]
# /proc パス（通常は変更不要）
# proc_path = "/proc"

[modules.unix_socket_monitor]
# UNIX ソケット監視モジュール — /proc/net/unix を解析し、
# UNIX ドメインソケットの出現・消失・不審なパスを検知
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 30
# 監視対象ディレクトリ — これらのディレクトリ配下のソケットのみ監視
watch_dirs = ["/run", "/tmp", "/var/run", "/var/tmp"]
# 既知の正常なソケット — これらが消失した場合は警告レベルを上げる
known_sockets = ["/run/dbus/system_bus_socket", "/run/systemd/private"]
# /proc パス（通常は変更不要）
# proc_path = "/proc"

[modules.abstract_socket_monitor]
# 抽象ソケット名前空間監視モジュール — /proc/net/unix から
# 抽象 UNIX ソケット（@ プレフィックス）を監視し、不審なソケットの出現を検知
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 30
# 許可パターン — これらにマッチしない抽象ソケットを検知
allowed_patterns = [
    "@/tmp/.X11-unix/*",
    "@/tmp/.ICE-unix/*",
    "@/run/dbus-*",
    "@/run/systemd/*",
    "@/run/user/*/bus",
    "@/run/user/*/at-spi*",
]
# バースト検知閾値（1スキャンサイクル内で新規出現がこの数を超えたら警告）
burst_threshold = 10
# /proc パス（通常は変更不要）
# proc_path = "/proc"

[modules.process_cgroup_monitor]
# プロセス cgroup 逸脱検知
# プロセスが本来所属すべき cgroup から逸脱していないかを監視し、
# コンテナブレイクアウトの兆候を検知する
enabled = false
scan_interval_secs = 30
# 監視対象プロセス名のフィルタ（空=全プロセス）
watch_process_names = []
# ホワイトリスト cgroup パターン（正規表現）
whitelist_patterns = []
# ルート cgroup（"/"）への移動検知
detect_root_cgroup_escape = true

[modules.ipc_monitor]
# System V IPC 監視
# 共有メモリ、セマフォ、メッセージキューの不正利用を検知する
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 60
# 過度に緩いパーミッション（0o666 等）を検知するか
alert_on_world_accessible = true
# 大容量共有メモリセグメントの閾値（バイト、デフォルト 100MB）
alert_on_large_shm_bytes = 104857600
# セマフォセット数の警告閾値
alert_on_high_semaphore_count = 100
# メッセージキュー数の警告閾値
alert_on_high_msg_queue_count = 50
# /proc/sysvipc パス（通常は変更不要）
# proc_sysvipc_path = "/proc/sysvipc"

[modules.privilege_escalation_monitor]
# プロセス権限昇格検知
# プロセスの UID/GID 変化を追跡し、不正な権限昇格を検知する
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 5
# 監視除外プロセス名
whitelist_processes = ["su", "sudo", "polkitd", "pkexec", "login", "sshd", "cron", "crond", "systemd"]
# /proc パス（通常は変更不要）
# proc_path = "/proc"

[modules.backdoor_detector]
# ソケットベースのバックドア検知
# /proc/net/tcp{,6} を定期スキャンし、ホワイトリスト外の
# リスニングソケットを検知してバックドアの存在を警告する
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 30
# 許可ポート番号リスト（このポートでリッスンしているソケットはアラート対象外）
allowed_ports = [22, 80, 443, 5432]
# 許可プロセス名リスト（このプロセスがリッスンしているソケットはアラート対象外）
allowed_processes = ["sshd", "nginx", "postgres", "systemd-resolve"]
# ループバックアドレス（127.0.0.1/::1）のリッスンもアラートするか
# false の場合、ループバックアドレスのみでリッスンしているソケットは無視する
alert_on_loopback = false
# /proc/net/tcp パス（通常は変更不要）
# tcp_path = "/proc/net/tcp"
# /proc/net/tcp6 パス（通常は変更不要）
# tcp6_path = "/proc/net/tcp6"
# /proc パス（通常は変更不要）
# proc_path = "/proc"
