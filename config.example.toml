# zettai-mamorukun 設定ファイル
# /etc/zettai-mamorukun/config.toml にコピーして使用する

[general]
# ログレベル: trace, debug, info, warn, error
log_level = "info"

[daemon]
# シャットダウンタイムアウト（秒）
# SIGTERM/SIGINT 受信後、実行中のアクション（Webhook 送信、コマンド実行等）の
# 完了をこの時間まで待機する。タイムアウト後は強制終了する
shutdown_timeout_secs = 30

[startup_scan]
# 起動時セキュリティスキャンの有効/無効
# 有効にするとデーモン起動時に全有効モジュールの初期スキャンを実行し、
# 現在のシステム状態をベースラインとして記録する
enabled = true
# スキャン全体のタイムアウト（秒）
timeout_secs = 60
# スキャン結果の永続化の有効/無効
# 有効にするとスキャン結果をファイルに保存し、次回起動時に前回との差分を検出する
persist_state = true
# スキャン状態ファイルのパス
state_file = "/var/lib/zettai-mamorukun/scan_state.json"

[modules.file_integrity]
# ファイル整合性監視モジュールの有効/無効
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 300
# 監視対象パスのリスト
watch_paths = []

[modules.process_monitor]
# プロセス異常検知モジュールの有効/無効
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 60
# 不審とみなすパスのリスト
suspicious_paths = ["/tmp", "/dev/shm", "/var/tmp"]

[modules.kernel_module]
# カーネルモジュール監視モジュールの有効/無効
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 120

[modules.at_job_monitor]
# at/batch ジョブ監視モジュールの有効/無効
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 120
# 監視対象パスのリスト
watch_paths = ["/var/spool/at", "/var/spool/cron/atjobs", "/etc/at.allow", "/etc/at.deny"]

[modules.cron_monitor]
# Cron ジョブ改ざん検知モジュールの有効/無効
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 120
# 監視対象パスのリスト
watch_paths = ["/etc/crontab", "/etc/cron.d", "/etc/cron.hourly", "/etc/cron.daily", "/etc/cron.weekly", "/etc/cron.monthly", "/var/spool/cron/crontabs"]

[modules.log_tamper]
# ログファイル改ざん検知モジュールの有効/無効
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 30
# 監視対象パスのリスト
watch_paths = ["/var/log/syslog", "/var/log/auth.log", "/var/log/kern.log", "/var/log/messages"]

[modules.systemd_service]
# systemd サービス監視モジュールの有効/無効
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 120
# 監視対象パスのリスト
watch_paths = ["/etc/systemd/system", "/usr/lib/systemd/system", "/usr/local/lib/systemd/system"]

[modules.firewall_monitor]
# ファイアウォールルール監視モジュールの有効/無効
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 60
# 監視対象パスのリスト
watch_paths = ["/proc/net/ip_tables_names", "/proc/net/ip6_tables_names", "/proc/net/ip_tables_targets", "/proc/net/ip_tables_matches", "/proc/net/ip6_tables_targets", "/proc/net/ip6_tables_matches"]

[modules.dns_monitor]
# DNS設定改ざん検知モジュールの有効/無効
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 30
# 監視対象パスのリスト
watch_paths = ["/etc/resolv.conf", "/etc/hosts"]

[modules.ssh_key_monitor]
# SSH公開鍵ファイル監視モジュールの有効/無効
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 120
# 監視対象の authorized_keys ファイルパスのリスト
watch_paths = ["/root/.ssh/authorized_keys"]

[modules.shell_config_monitor]
# シェル設定ファイル監視モジュールの有効/無効
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 120
# 監視対象のシェル設定ファイルパスのリスト
watch_paths = ["/etc/profile", "/etc/bash.bashrc", "/etc/environment", "/root/.bashrc", "/root/.profile"]

[modules.mount_monitor]
# マウントポイント監視モジュールの有効/無効
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 30
# マウント情報ファイルのパス
mounts_path = "/proc/mounts"

[modules.tmp_exec_monitor]
# 一時ディレクトリ実行ファイル検知モジュールの有効/無効
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 60
# 監視対象ディレクトリのリスト
watch_dirs = ["/tmp", "/dev/shm", "/var/tmp"]

[modules.sudoers_monitor]
# sudoers ファイル監視モジュールの有効/無効
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 120
# 監視対象パスのリスト（ファイルまたはディレクトリ）
watch_paths = ["/etc/sudoers", "/etc/sudoers.d"]

[modules.pam_monitor]
# PAM 設定監視モジュールの有効/無効
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 120
# 監視対象パスのリスト（ファイルまたはディレクトリ）
watch_paths = ["/etc/pam.d"]

[modules.security_files_monitor]
# /etc/security/ 監視モジュールの有効/無効
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 120
# 監視対象パスのリスト（ファイルまたはディレクトリ）
watch_paths = [
    "/etc/security/limits.conf",
    "/etc/security/limits.d",
    "/etc/security/access.conf",
    "/etc/security/namespace.conf",
    "/etc/security/group.conf",
    "/etc/security/time.conf",
    "/etc/security/pam_env.conf",
    "/etc/security/faillock.conf",
    "/etc/security/pwquality.conf",
]

[modules.mac_monitor]
# SELinux / AppArmor 監視モジュールの有効/無効
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 30
# SELinux 設定ファイルのパスリスト
selinux_config_paths = ["/etc/selinux/config"]
# SELinux ポリシーディレクトリのリスト
selinux_policy_dirs = ["/etc/selinux"]
# SELinux enforce ファイルのパス
selinux_enforce_path = "/sys/fs/selinux/enforce"
# AppArmor 設定パスのリスト
apparmor_config_paths = ["/etc/apparmor", "/etc/apparmor.d"]
# AppArmor profiles ファイルのパス
apparmor_profiles_path = "/sys/kernel/security/apparmor/profiles"

[modules.capabilities_monitor]
# Linux capabilities 監視モジュールの有効/無効
# /proc/*/status の CapEff/CapPrm を定期スキャンし、
# 危険な capabilities を持つプロセスを検知する
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 60
# 危険と見なす capabilities のビット番号リスト
# デフォルト: DAC_OVERRIDE(1), SETGID(6), SETUID(7), NET_ADMIN(12),
#             NET_RAW(13), SYS_MODULE(16), SYS_PTRACE(19), SYS_ADMIN(21)
dangerous_caps = [1, 6, 7, 12, 13, 16, 19, 21]
# ホワイトリスト（除外するプロセス名）
whitelist_processes = [
  "systemd",
  "systemd-journal",
  "systemd-udevd",
  "systemd-logind",
  "systemd-resolve",
  "systemd-timesyn",
  "systemd-network",
  "networkd-dispat",
  "dbus-daemon",
  "polkitd",
]

[modules.container_namespace]
# コンテナ・名前空間検知モジュールの有効/無効
# /proc/self/ns/ の inode と /proc/self/cgroup を定期スキャンし、
# コンテナブレイクアウトや名前空間の不正操作を検知する
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 30
# 監視対象の名前空間リスト
watch_namespaces = ["mnt", "pid", "net", "ipc", "uts", "user", "cgroup"]
# コンテナ環境マーカー（/.dockerenv, /run/.containerenv）のチェック
check_container_env = true

[modules.cgroup_monitor]
# cgroup v2 リソース制限監視モジュールの有効/無効
# /sys/fs/cgroup/ 配下を定期スキャンし、
# リソース制限の不正な変更を検知する
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 30
# cgroup v2 ファイルシステムのベースパス
cgroup_path = "/sys/fs/cgroup"
# 再帰スキャンの最大深さ
max_depth = 5
# 監視対象の cgroup ファイル名リスト
watch_files = ["memory.max", "memory.high", "cpu.max", "pids.max", "io.max"]

[modules.kernel_params]
# /proc/sys/ カーネルパラメータ監視モジュールの有効/無効
# セキュリティ関連カーネルパラメータを定期スキャンし、
# 変更や弱体化を検知する
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 60
# proc/sys のベースパス
proc_sys_path = "/proc/sys"
# 監視対象パラメータルール
# path: パラメータパス（proc_sys_path からの相対パス）
# min_value: 最小値（この値未満で Critical）
# expected_value: 期待値（不一致で Warning）
[[modules.kernel_params.watch_params]]
path = "kernel/kptr_restrict"
min_value = 1
[[modules.kernel_params.watch_params]]
path = "kernel/dmesg_restrict"
min_value = 1
[[modules.kernel_params.watch_params]]
path = "kernel/randomize_va_space"
min_value = 2
[[modules.kernel_params.watch_params]]
path = "kernel/sysrq"
[[modules.kernel_params.watch_params]]
path = "kernel/unprivileged_bpf_disabled"
min_value = 1
[[modules.kernel_params.watch_params]]
path = "kernel/yama/ptrace_scope"
min_value = 1
[[modules.kernel_params.watch_params]]
path = "kernel/perf_event_paranoid"
min_value = 2
[[modules.kernel_params.watch_params]]
path = "kernel/core_pattern"

[modules.proc_net_monitor]
# /proc/net/ 監視モジュールの有効/無効
# ルーティングテーブル（/proc/net/route）と ARP テーブル（/proc/net/arp）を
# 定期スキャンし、不正変更・ARP スプーフィングを検知する
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 30
# /proc/net/route のパス
route_path = "/proc/net/route"
# /proc/net/arp のパス
arp_path = "/proc/net/arp"

[modules.seccomp_monitor]
# seccomp プロファイル監視モジュールの有効/無効
# /proc/*/status の Seccomp フィールドを定期スキャンし、
# 監視対象プロセスの seccomp フィルタが無効化されていないかを検知する
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 30
# 監視対象プロセス名のリスト
watched_processes = [
  "sshd",
  "nginx",
  "apache2",
  "postgres",
  "mysqld",
  "dockerd",
  "containerd",
  "named",
  "unbound",
  "haproxy",
]

[modules.usb_monitor]
# USB デバイス監視モジュールの有効/無効
# /sys/bus/usb/devices/ を定期スキャンし、
# USB デバイスの接続・切断を検知する（BadUSB 攻撃対策）
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 10
# USB デバイスディレクトリのパス
devices_path = "/sys/bus/usb/devices"

[modules.listening_port_monitor]
# リスニングポート監視モジュールの有効/無効
# /proc/net/tcp{,6}, /proc/net/udp{,6} を定期スキャンし、
# 想定外のリスニングポートやバインドアドレスの変更を検知する
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 30
# 許可ポートリスト（"プロトコル:ポート番号" 形式）
# 空の場合はホワイトリストを適用しない（変更検知のみ）
allowed_ports = ["tcp:22", "tcp:80", "tcp:443", "udp:53"]
# IPv6 監視の有効/無効
enable_ipv6 = true
# /proc/net/tcp のパス
tcp_path = "/proc/net/tcp"
# /proc/net/tcp6 のパス
tcp6_path = "/proc/net/tcp6"
# /proc/net/udp のパス
udp_path = "/proc/net/udp"
# /proc/net/udp6 のパス
udp6_path = "/proc/net/udp6"

[modules.suid_sgid_monitor]
# SUID/SGID ファイル監視モジュールの有効/無効
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 300
# 監視対象ディレクトリのリスト
watch_dirs = ["/usr/bin", "/usr/sbin", "/usr/local/bin", "/usr/local/sbin"]

[modules.user_account]
# ユーザーアカウント監視モジュールの有効/無効
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 60
# passwd ファイルのパス
passwd_path = "/etc/passwd"
# group ファイルのパス
group_path = "/etc/group"

[modules.pkg_repo_monitor]
# パッケージリポジトリ改ざん検知モジュールの有効/無効
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 120
# 監視対象パスのリスト（ファイルまたはディレクトリ）
watch_paths = ["/etc/apt/sources.list", "/etc/apt/sources.list.d", "/etc/yum.repos.d"]

[modules.ld_preload_monitor]
# 環境変数・LD_PRELOAD 監視モジュールの有効/無効
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 60
# 監視対象パスのリスト（ファイルまたはディレクトリ）
watch_paths = ["/etc/ld.so.preload", "/etc/environment", "/etc/ld.so.conf", "/etc/ld.so.conf.d"]

[modules.network_monitor]
# ネットワーク接続監視モジュールの有効/無効
enabled = false
# 監視間隔（秒）
interval_secs = 30
# IPv6 監視の有効/無効
enable_ipv6 = true
# 不審ポートリスト
suspicious_ports = [4444, 5555, 6666, 8888, 1337]
# 接続数閾値
max_connections = 1000

[modules.ssh_brute_force]
# SSH ブルートフォース検知モジュールの有効/無効
enabled = false
# スキャン間隔（秒）
interval_secs = 30
# 認証ログファイルのパス
auth_log_path = "/var/log/auth.log"
# 認証失敗の閾値（この回数を超えるとアラート）
max_failures = 5
# 時間窓（秒）- この期間内の失敗回数をカウント
time_window_secs = 300

[metrics]
# イベント統計・メトリクス収集の有効/無効
enabled = false
# サマリーログ出力インターバル（秒）
interval_secs = 60

[event_bus]
# イベントバスの有効/無効
enabled = false
# ブロードキャストチャネルの容量
channel_capacity = 1024
# イベントデバウンス間隔（秒）— 同一イベントをこの期間内は抑制する
# 0 でデバウンスを無効化。Critical イベントは常に即時配信
debounce_secs = 30

# モジュールごとのイベントフィルタリング設定
# [event_bus.filters.file_integrity]
# exclude_patterns = ["\\.swp$", "\\.tmp$", "~$"]
# include_patterns = []
# min_severity = "warning"

[actions]
# アクションエンジンの有効/無効
# ※ SIGHUP によるホットリロードに対応（ルール変更はデーモン再起動不要）
enabled = false

# [[actions.rules]]
# name = "critical_command"
# severity = "Critical"
# action = "command"
# command = "/usr/local/bin/alert.sh '{{message}}'"
# timeout_secs = 30

# [[actions.rules]]
# name = "warning_log"
# severity = "Warning"
# action = "log"

# [[actions.rules]]
# name = "webhook_alert"
# severity = "critical"
# action = "webhook"
# url = "https://hooks.slack.com/services/xxx/yyy/zzz"
# method = "POST"
# timeout_secs = 10
# max_retries = 3
# [actions.rules.headers]
# Content-Type = "application/json"
# body_template = '{"text": "[{{severity}}] {{source}}: {{message}}"}'

# レートリミット設定（トークンバケットアルゴリズム）
# 未設定の場合はレートリミットなし
# [actions.rate_limit.command]
# max_tokens = 10           # バケット容量（バースト許容数）
# refill_amount = 5         # 補充トークン数
# refill_interval_secs = 60 # 補充間隔（秒）

# [actions.rate_limit.webhook]
# max_tokens = 20           # バケット容量（バースト許容数）
# refill_amount = 10        # 補充トークン数
# refill_interval_secs = 60 # 補充間隔（秒）

[status]
# ステータスサーバー（Unix ソケット）の有効/無効
# 有効にすると `zettai-mamorukun status` コマンドでデーモンの状態を確認できる
enabled = false
# Unix ソケットのパス
socket_path = "/var/run/zettai-mamorukun/status.sock"

[health]
# ハートビート（定期的なヘルスチェックログ出力）の有効/無効
enabled = true
# ハートビートのインターバル（秒）
heartbeat_interval_secs = 60
