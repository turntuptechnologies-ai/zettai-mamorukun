# zettai-mamorukun 設定ファイル
# /etc/zettai-mamorukun/config.toml にコピーして使用する

[general]
# ログレベル: trace, debug, info, warn, error
log_level = "info"

[modules.file_integrity]
# ファイル整合性監視モジュールの有効/無効
enabled = false
# スキャン間隔（秒）
scan_interval_secs = 300
# 監視対象パスのリスト
watch_paths = []

[health]
# ハートビート（定期的なヘルスチェックログ出力）の有効/無効
enabled = true
# ハートビートのインターバル（秒）
heartbeat_interval_secs = 60
